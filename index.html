<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LightCitySMP | Shop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">

    <!-- ═══════════════════════════════════════════════════════════════════
         ★ SHOP CONFIG ★ — Edit products here. Everything is live-driven.
         ───────────────────────────────────────────────────────────────────
         REQUIRED fields:  id, name, price, category
         OPTIONAL fields:
           description    — short product blurb (string)
           banner         — image URL displayed at top of card (string)
           bannerEmoji    — emoji fallback if no banner image (string)
           accent         — card accent: "gold" | "crimson" | "violet" | "cyan"
           discount       — { percent: 25, originalPrice: 9.99 }   (omit if none)
           isNew          — true/false (toggles the NEW tag animation)
           isLimited      — true/false (turns on stock + timer)
           stock          — number (only used if isLimited true)
           limitedUntil   — ISO date string for countdown timer (only if isLimited)
           tag            — small label e.g. "BEST VALUE", "STARTER"
           perUnit        — string shown next to price e.g. "/ home"
           popular        — true/false (highlights card)
         ═══════════════════════════════════════════════════════════════════ -->
    <script>
    const SHOP_CONFIG = {
        currency: "$",
        storeUrl: "#", // change to real store URL when ready

        categories: [
            { id: "homes",     name: "Homes",          icon: "🏠" },
            { id: "rebirth",   name: "Rebirth Points", icon: "⭐" },
            { id: "slots",     name: "Ability Slots",  icon: "🎰" },
            { id: "abilities", name: "Abilities",      icon: "⚡" }
        ],

        products: [
            // ─── HOMES ───────────────────────────────────────────────────
            {
                id: "home-extra",
                name: "Extra Home Slot",
                description: "Unlock an additional /home location. Stack as many as you want — each slot is permanent.",
                price: 1.00,
                perUnit: "/ slot",
                category: "homes",
                accent: "gold",
                bannerEmoji: "🏠",
                tag: "STARTER"
            },

            // ─── REBIRTH POINTS ──────────────────────────────────────────
            {
                id: "rebirth-single",
                name: "Rebirth Point",
                description: "A single Rebirth Point — spend it to ascend and unlock one ability of your choosing.",
                price: 0.50,
                perUnit: "/ point",
                category: "rebirth",
                accent: "violet",
                bannerEmoji: "✦"
            },
            {
                id: "rebirth-5pack",
                name: "5x Rebirth Bundle",
                description: "Five Rebirth Points delivered instantly. Skip the grind, claim the ascension.",
                price: 4.99,
                category: "rebirth",
                accent: "violet",
                bannerEmoji: "✦✦✦",
                popular: true,
                tag: "POPULAR"
            },
            {
                id: "rebirth-15pack",
                name: "15x Rebirth Bundle",
                description: "Fifteen Rebirth Points — the deepest discount available. Reach max ascension faster.",
                price: 10.99,
                category: "rebirth",
                accent: "violet",
                bannerEmoji: "✦✦✦✦✦",
                discount: { percent: 27, originalPrice: 14.99 },
                tag: "BEST VALUE"
            },

            // ─── ABILITY SLOTS ───────────────────────────────────────────
            {
                id: "slot-extra",
                name: "Extra Ability Slot",
                description: "Equip one more ability simultaneously. Maximum of 3 additional slots per player.",
                price: 10.00,
                perUnit: "/ slot · max 3",
                category: "slots",
                accent: "cyan",
                bannerEmoji: "◈",
                tag: "LIMIT 3"
            },

            // ─── ABILITIES ───────────────────────────────────────────────
            {
                id: "ability-clone",
                name: "Clone",
                description: "Spawn a temporary clone that mirrors your movement and confuses your enemies in combat.",
                price: 4.99,
                category: "abilities",
                accent: "cyan",
                bannerEmoji: "👥",
                isNew: true
            },
            {
                id: "ability-guardian",
                name: "Guardian",
                description: "Summon a warding aura that intercepts incoming damage. The shield of the ascended.",
                price: 7.99,
                category: "abilities",
                accent: "gold",
                bannerEmoji: "🛡️",
                isNew: true
            },
            {
                id: "ability-poltergeist",
                name: "Poltergeist",
                description: "Phase between dimensions, leaving spectral echoes that haunt and disorient your target.",
                price: 11.99,
                category: "abilities",
                accent: "crimson",
                bannerEmoji: "👻",
                isNew: true,
                isLimited: true,
                stock: 25,
                // limitedUntil format: "YYYY-MM-DDTHH:MM:SS" — set a future date
                limitedUntil: "2026-06-01T23:59:59"
            }
        ]
    };
    </script>

    <style>
        :root {
            --gold: #D4A843;
            --gold-bright: #F0C060;
            --gold-dim: #8A6B28;
            --gold-trace: rgba(212, 168, 67, 0.12);
            --gold-glow: rgba(212, 168, 67, 0.22);

            --crimson: #C13838;
            --crimson-bright: #E85555;
            --crimson-dim: #7A1F1F;
            --crimson-trace: rgba(193, 56, 56, 0.12);
            --crimson-glow: rgba(193, 56, 56, 0.25);

            --violet: #9D5BD2;
            --violet-bright: #B87AF0;
            --violet-dim: #5E2D85;
            --violet-trace: rgba(157, 91, 210, 0.12);
            --violet-glow: rgba(157, 91, 210, 0.25);

            --cyan: #4FC3D9;
            --cyan-bright: #6FE0F5;
            --cyan-dim: #2A6E80;
            --cyan-trace: rgba(79, 195, 217, 0.12);
            --cyan-glow: rgba(79, 195, 217, 0.25);

            --ink: #080808;
            --ink-2: #0F0F0D;
            --ink-3: #141412;
            --surface: rgba(255,255,255,0.025);
            --surface-hover: rgba(255,255,255,0.045);
            --border: rgba(212, 168, 67, 0.14);
            --border-strong: rgba(212, 168, 67, 0.35);
            --text: #E8E2D5;
            --text-dim: rgba(232, 226, 213, 0.55);
            --text-muted: rgba(232, 226, 213, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'Syne', sans-serif;
            background: var(--ink);
            color: var(--text);
            overflow-x: hidden;
            line-height: 1.6;
            min-height: 100vh;
        }

        /* ═══ BACKGROUND ═════════════════════════════════════════════════ */
        .bg-layer {
            position: fixed; inset: 0; z-index: -3;
            background:
                radial-gradient(ellipse 80% 60% at 20% 15%, rgba(212,168,67,0.10) 0%, transparent 55%),
                radial-gradient(ellipse 60% 50% at 80% 85%, rgba(157,91,210,0.06) 0%, transparent 50%),
                radial-gradient(ellipse 50% 40% at 50% 50%, rgba(193,56,56,0.04) 0%, transparent 60%),
                var(--ink);
        }

        .bg-lines {
            position: fixed; inset: 0; z-index: -2;
            background-image:
                linear-gradient(rgba(212,168,67,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(212,168,67,0.04) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: radial-gradient(ellipse at 50% 40%, black 30%, transparent 75%);
        }

        .bg-particles {
            position: fixed; inset: 0; z-index: -1;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 2px; height: 2px;
            background: var(--gold);
            border-radius: 50%;
            box-shadow: 0 0 6px var(--gold), 0 0 12px var(--gold-glow);
            opacity: 0;
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }

        /* ═══ LOADER ═════════════════════════════════════════════════════ */
        .loader {
            position: fixed; inset: 0; z-index: 9999;
            background: var(--ink);
            display: flex; justify-content: center; align-items: center;
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }
        .loader.hidden { opacity: 0; visibility: hidden; }
        .loader-inner { text-align: center; }
        .loader-ring {
            width: 64px; height: 64px;
            border: 2px solid rgba(212,168,67,0.1);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
            margin: 0 auto 1.2rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.72rem;
            letter-spacing: 0.3em;
            color: var(--gold-dim);
            text-transform: uppercase;
        }

        /* ═══ NAV ════════════════════════════════════════════════════════ */
        nav {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            padding: 1.2rem 5%;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(8,8,8,0.88);
            backdrop-filter: blur(24px);
            border-bottom: 1px solid var(--border);
            transition: padding 0.3s ease, box-shadow 0.3s ease;
        }
        nav.scrolled {
            padding: 0.9rem 5%;
            box-shadow: 0 4px 40px rgba(0,0,0,0.7);
        }
        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--gold);
            text-decoration: none;
            letter-spacing: 0.03em;
            display: flex; align-items: center; gap: 0.4rem;
            text-shadow: 0 0 10px rgba(212, 168, 67, 0.5);
        }
        .nav-icons { display: flex; gap: 0.6rem; align-items: center; }
        .nav-icon-btn {
            width: 44px; height: 44px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }
        .nav-icon-btn:hover {
            background: var(--gold-trace);
            border-color: var(--border-strong);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(212,168,67,0.15);
        }
        .nav-icon-btn.active {
            background: var(--gold-trace);
            border-color: var(--gold);
            box-shadow: 0 0 16px rgba(212,168,67,0.2);
        }
        .nav-icon-btn svg {
            width: 20px; height: 20px;
            fill: var(--gold);
            transition: transform 0.25s ease;
        }
        .nav-icon-btn:hover svg { transform: scale(1.1); }

        /* ═══ HERO ═══════════════════════════════════════════════════════ */
        .shop-hero {
            min-height: 60vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center;
            padding: 9rem 5% 4rem;
            position: relative;
        }

        .shop-hero::before {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 600px; height: 600px;
            background: radial-gradient(circle, var(--gold-trace) 0%, transparent 60%);
            z-index: -1;
            animation: pulseGlow 5s ease-in-out infinite;
        }

        @keyframes pulseGlow {
            0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.9; transform: translate(-50%, -50%) scale(1.15); }
        }

        .hero-eyebrow {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            letter-spacing: 0.3em;
            color: var(--gold-dim);
            text-transform: uppercase;
            margin-bottom: 1.5rem;
            opacity: 0;
            animation: fadeUp 0.8s ease 0.2s forwards;
        }

        .hero-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(3rem, 9vw, 6rem);
            font-weight: 700;
            line-height: 0.95;
            letter-spacing: -0.02em;
            margin-bottom: 1rem;
            color: var(--gold-bright);
            text-shadow: 0 0 30px rgba(212, 168, 67, 0.4);
            opacity: 0;
            animation: fadeUp 0.8s ease 0.35s forwards;
        }

        .hero-rule {
            display: flex; align-items: center; gap: 1rem;
            justify-content: center;
            margin: 1.5rem 0;
            opacity: 0;
            animation: fadeUp 0.8s ease 0.5s forwards;
        }
        .hero-rule span {
            height: 1px; width: 60px;
            background: linear-gradient(90deg, transparent, var(--gold-dim));
        }
        .hero-rule span:last-child {
            background: linear-gradient(90deg, var(--gold-dim), transparent);
        }
        .hero-rule em { color: var(--gold); font-style: normal; font-size: 0.85rem; }

        .hero-sub {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.2rem;
            font-style: italic;
            color: var(--text-dim);
            max-width: 540px;
            margin: 0 auto;
            line-height: 1.7;
            opacity: 0;
            animation: fadeUp 0.8s ease 0.6s forwards;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ═══ CATEGORY TABS ══════════════════════════════════════════════ */
        .category-bar {
            display: flex; flex-wrap: wrap;
            justify-content: center;
            gap: 0.6rem;
            max-width: 900px;
            margin: 0 auto 4rem;
            padding: 0 5%;
            opacity: 0;
            animation: fadeUp 0.8s ease 0.75s forwards;
        }

        .cat-btn {
            padding: 0.7rem 1.4rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-dim);
            font-family: 'Syne', sans-serif;
            font-size: 0.82rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex; align-items: center; gap: 0.5rem;
        }

        .cat-btn:hover {
            background: var(--gold-trace);
            color: var(--text);
            border-color: var(--border-strong);
            transform: translateY(-2px);
        }

        .cat-btn.active {
            background: var(--gold-trace);
            color: var(--gold-bright);
            border-color: var(--gold);
            box-shadow: 0 0 16px rgba(212,168,67,0.2);
        }

        .cat-btn .cat-icon { font-size: 1rem; }

        /* ═══ PRODUCTS GRID ══════════════════════════════════════════════ */
        .container { max-width: 1280px; margin: 0 auto; padding: 0 5%; }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            padding-bottom: 6rem;
        }

        /* ═══ PRODUCT CARD ═══════════════════════════════════════════════ */
        .product-card {
            position: relative;
            background: linear-gradient(180deg, var(--ink-3) 0%, var(--ink-2) 100%);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            transform: translateY(30px);
            display: flex;
            flex-direction: column;
        }

        .product-card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .product-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 14px;
            padding: 1px;
            background: linear-gradient(135deg, transparent 30%, var(--card-glow, var(--gold)) 50%, transparent 70%);
            -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }

        .product-card:hover {
            transform: translateY(-8px);
            border-color: var(--card-border, var(--border-strong));
            box-shadow:
                0 20px 60px rgba(0,0,0,0.6),
                0 0 30px var(--card-glow-soft, rgba(212,168,67,0.15));
        }

        .product-card:hover::before { opacity: 1; }

        /* Accent variants */
        .product-card[data-accent="gold"]    { --card-glow: var(--gold);    --card-glow-soft: var(--gold-glow);    --card-border: var(--gold); --card-trace: var(--gold-trace); }
        .product-card[data-accent="crimson"] { --card-glow: var(--crimson); --card-glow-soft: var(--crimson-glow); --card-border: var(--crimson); --card-trace: var(--crimson-trace); }
        .product-card[data-accent="violet"]  { --card-glow: var(--violet);  --card-glow-soft: var(--violet-glow);  --card-border: var(--violet); --card-trace: var(--violet-trace); }
        .product-card[data-accent="cyan"]    { --card-glow: var(--cyan);    --card-glow-soft: var(--cyan-glow);    --card-border: var(--cyan); --card-trace: var(--cyan-trace); }

        /* ─── Banner ──────────────────────────────────── */
        .product-banner {
            position: relative;
            height: 160px;
            background: linear-gradient(135deg,
                var(--card-trace, var(--gold-trace)) 0%,
                rgba(255,255,255,0.02) 50%,
                var(--card-trace, var(--gold-trace)) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-bottom: 1px solid var(--border);
        }

        .product-banner::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                radial-gradient(circle at 30% 30%, var(--card-glow-soft, var(--gold-glow)) 0%, transparent 50%),
                radial-gradient(circle at 70% 70%, var(--card-glow-soft, var(--gold-glow)) 0%, transparent 50%);
            opacity: 0.6;
            transition: opacity 0.4s ease;
        }

        .product-card:hover .product-banner::before { opacity: 1; }

        .product-banner img {
            width: 100%; height: 100%;
            object-fit: cover;
            position: relative; z-index: 1;
            transition: transform 0.5s ease;
        }

        .product-card:hover .product-banner img { transform: scale(1.08); }

        .banner-emoji {
            font-size: 4.5rem;
            position: relative; z-index: 1;
            filter: drop-shadow(0 0 20px var(--card-glow, var(--gold)));
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .product-card:hover .banner-emoji {
            transform: scale(1.15) rotate(-5deg);
        }

        /* ─── Floating tag (NEW / POPULAR / LIMIT) ────── */
        .product-tag {
            position: absolute;
            top: 1rem; left: 1rem;
            padding: 0.35rem 0.8rem;
            background: var(--ink);
            border: 1px solid var(--card-border, var(--gold));
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.62rem;
            letter-spacing: 0.15em;
            color: var(--card-glow, var(--gold-bright));
            text-transform: uppercase;
            z-index: 3;
            font-weight: 500;
        }

        /* ─── NEW badge with custom animation ─────────── */
        .new-badge {
            position: absolute;
            top: 1rem; right: 1rem;
            padding: 0.4rem 0.85rem;
            background: linear-gradient(135deg, var(--crimson) 0%, var(--crimson-bright) 100%);
            color: #fff;
            font-family: 'Syne', sans-serif;
            font-size: 0.65rem;
            font-weight: 800;
            letter-spacing: 0.18em;
            border-radius: 4px;
            z-index: 3;
            text-transform: uppercase;
            box-shadow: 0 4px 16px rgba(193,56,56,0.5);
            overflow: hidden;
        }

        .new-badge::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
            animation: newShimmer 2.5s infinite;
        }

        @keyframes newShimmer {
            0% { left: -100%; }
            50%, 100% { left: 200%; }
        }

        /* ─── Discount badge with bounce animation ────── */
        .discount-badge {
            position: absolute;
            top: 1rem; right: 1rem;
            width: 60px; height: 60px;
            background: linear-gradient(135deg, var(--crimson) 0%, var(--crimson-bright) 100%);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            box-shadow: 0 6px 20px rgba(193,56,56,0.6);
            z-index: 4;
            animation: discountPulse 2s ease-in-out infinite;
        }

        @keyframes discountPulse {
            0%, 100% { transform: scale(1) rotate(-8deg); }
            50% { transform: scale(1.1) rotate(8deg); }
        }

        .discount-badge .pct-num {
            font-size: 1.05rem;
            line-height: 1;
        }
        .discount-badge .pct-off {
            font-size: 0.55rem;
            letter-spacing: 0.1em;
            margin-top: 2px;
            opacity: 0.9;
        }

        /* When both new + discount, stack them */
        .product-card .new-badge + .discount-badge { top: 4.2rem; }

        /* ─── Body ───────────────────────────────────── */
        .product-body {
            padding: 1.5rem 1.5rem 1.6rem;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .product-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.55rem;
            font-weight: 700;
            color: var(--text);
            line-height: 1.2;
            margin-bottom: 0.5rem;
            letter-spacing: -0.01em;
        }

        .product-card:hover .product-name {
            color: var(--card-glow, var(--gold-bright));
        }

        .product-desc {
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 1.25rem;
            flex-grow: 1;
        }

        /* ─── Stock + Timer for limited items ─────────── */
        .limited-info {
            background: rgba(193,56,56,0.06);
            border: 1px solid rgba(193,56,56,0.25);
            border-radius: 6px;
            padding: 0.7rem 0.9rem;
            margin-bottom: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.45rem;
        }

        .stock-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .stock-label { color: var(--text-muted); }

        .stock-count {
            color: var(--crimson-bright);
            font-weight: 500;
        }

        .stock-count .stock-low { color: var(--crimson-bright); animation: stockBlink 1.4s infinite; }
        @keyframes stockBlink { 50% { opacity: 0.4; } }

        .stock-bar {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.05);
            border-radius: 2px;
            overflow: hidden;
        }

        .stock-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--crimson-dim), var(--crimson-bright));
            border-radius: 2px;
            transition: width 0.8s ease;
        }

        .timer-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.72rem;
        }

        .timer-label {
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .timer-display {
            color: var(--crimson-bright);
            font-weight: 500;
            letter-spacing: 0.05em;
        }

        /* ─── Price ──────────────────────────────────── */
        .price-block {
            display: flex;
            align-items: baseline;
            gap: 0.6rem;
            margin-bottom: 1.1rem;
            flex-wrap: wrap;
        }

        .price-current {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.1rem;
            font-weight: 700;
            color: var(--card-glow, var(--gold-bright));
            line-height: 1;
            letter-spacing: -0.01em;
        }

        .price-original {
            font-size: 1rem;
            color: var(--text-muted);
            text-decoration: line-through;
            text-decoration-color: var(--crimson);
        }

        .price-unit {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.72rem;
            color: var(--text-muted);
            letter-spacing: 0.05em;
            margin-left: -0.2rem;
        }

        /* ─── CTA ────────────────────────────────────── */
        .product-cta {
            width: 100%;
            padding: 0.85rem;
            background: var(--card-trace, var(--gold-trace));
            border: 1px solid var(--card-border, var(--gold));
            border-radius: 8px;
            color: var(--card-glow, var(--gold-bright));
            font-family: 'Syne', sans-serif;
            font-size: 0.82rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            text-decoration: none;
            position: relative;
            overflow: hidden;
        }

        .product-cta::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, var(--card-glow-soft, var(--gold-glow)), transparent);
            transition: left 0.5s ease;
        }

        .product-cta:hover::before { left: 100%; }

        .product-cta:hover {
            background: var(--card-glow, var(--gold));
            color: var(--ink);
            box-shadow: 0 8px 24px var(--card-glow-soft, var(--gold-glow));
        }

        .product-cta .arrow {
            transition: transform 0.3s ease;
        }

        .product-cta:hover .arrow { transform: translateX(4px); }

        /* Sold out state */
        .product-cta.sold-out {
            background: rgba(255,255,255,0.03);
            border-color: rgba(255,255,255,0.08);
            color: var(--text-muted);
            cursor: not-allowed;
        }
        .product-cta.sold-out:hover {
            background: rgba(255,255,255,0.03);
            color: var(--text-muted);
            box-shadow: none;
        }
        .product-cta.sold-out::before { display: none; }

        /* ═══ EMPTY STATE ════════════════════════════════════════════════ */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 1.2rem;
            grid-column: 1 / -1;
        }

        /* ═══ FOOTER ═════════════════════════════════════════════════════ */
        footer {
            border-top: 1px solid var(--border);
            padding: 4rem 0 2rem;
            margin-top: 2rem;
        }
        .footer-inner { max-width: 500px; margin: 0 auto; text-align: center; }

        .ascension-glow {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.2rem;
            font-weight: 700;
            color: #ff2a2a;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-bottom: 0.5rem;
            text-shadow:
                0 0 10px rgba(255, 0, 0, 0.8),
                0 -5px 15px rgba(200, 0, 0, 0.6),
                0 -10px 20px rgba(100, 0, 0, 0.5),
                0 -15px 30px rgba(0, 0, 0, 0.9);
            animation: pulseSmoke 3s infinite alternate;
        }

        @keyframes pulseSmoke {
            0% {
                text-shadow:
                    0 0 10px rgba(255, 0, 0, 0.8),
                    0 -5px 15px rgba(200, 0, 0, 0.6),
                    0 -10px 20px rgba(100, 0, 0, 0.5),
                    0 -15px 30px rgba(0, 0, 0, 0.9);
            }
            100% {
                text-shadow:
                    0 0 15px rgba(255, 50, 50, 0.9),
                    0 -8px 20px rgba(220, 20, 20, 0.7),
                    0 -12px 25px rgba(120, 0, 0, 0.7),
                    0 -20px 40px rgba(0, 0, 0, 1);
            }
        }

        .footer-credits {
            font-size: 0.82rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--ink); }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, var(--gold-dim), var(--gold));
            border-radius: 3px;
        }

        @media (max-width: 768px) {
            .nav-icon-btn { width: 40px; height: 40px; }
            .shop-hero { padding: 7rem 5% 3rem; min-height: 50vh; }
            .products-grid { grid-template-columns: 1fr; gap: 1.2rem; }
            .product-banner { height: 140px; }
            .banner-emoji { font-size: 3.8rem; }
            .price-current { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div class="loader" id="loader">
        <div class="loader-inner">
            <div class="loader-ring"></div>
            <div class="loader-label">LightCitySMP</div>
        </div>
    </div>

    <div class="bg-layer"></div>
    <div class="bg-lines"></div>
    <div class="bg-particles" id="particles"></div>

    <nav id="navbar">
        <a href="index.html" class="logo">LightCitySMP</a>
        <div class="nav-icons">
            <a href="shop.html" class="nav-icon-btn active" title="Shop">
                <svg viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>
            </a>
            <a href="perks.html" class="nav-icon-btn" title="Rank Perks">
                <svg viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
            </a>
            <a href="index.html#wiki" class="nav-icon-btn" title="Wiki">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
            </a>
            <a href="rules.html" class="nav-icon-btn" title="Rules">
                <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
            </a>
        </div>
    </nav>

    <section class="shop-hero">
        <p class="hero-eyebrow">Season 5 · Official Store</p>
        <h1 class="hero-title">Ascend Faster</h1>
        <div class="hero-rule"><span></span><em>✦</em><span></span></div>
        <p class="hero-sub">Skip the grind, claim the power. Every purchase fuels the server's future.</p>
    </section>

    <div class="category-bar" id="categoryBar"></div>

    <div class="container">
        <div class="products-grid" id="productsGrid"></div>
    </div>

    <footer>
        <div class="container">
            <div class="footer-inner">
                <div class="ascension-glow">Ascension</div>
                <p class="footer-credits">Developer credits: Sam, Fanta, George767</p>
            </div>
        </div>
    </footer>

    <script>
    // ═══════════════════════════════════════════════════════════════════
    //   PARTICLE GENERATION (background ambience)
    // ═══════════════════════════════════════════════════════════════════
    (function spawnParticles() {
        const wrap = document.getElementById('particles');
        const count = 18;
        for (let i = 0; i < count; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDuration = (12 + Math.random() * 14) + 's';
            p.style.animationDelay = (Math.random() * 14) + 's';
            const size = 1 + Math.random() * 2.5;
            p.style.width = size + 'px';
            p.style.height = size + 'px';
            wrap.appendChild(p);
        }
    })();

    // ═══════════════════════════════════════════════════════════════════
    //   LOADER
    // ═══════════════════════════════════════════════════════════════════
    window.addEventListener('load', () => {
        setTimeout(() => document.getElementById('loader').classList.add('hidden'), 1000);
    });

    window.addEventListener('scroll', () => {
        document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 50);
    });

    // ═══════════════════════════════════════════════════════════════════
    //   SHOP STATE
    // ═══════════════════════════════════════════════════════════════════
    let activeCategory = 'all';
    const timers = {}; // id → interval handle so we can clear on filter

    // ─── Render category bar ──────────────────────────────────────────
    function renderCategories() {
        const bar = document.getElementById('categoryBar');
        const allBtn = `<button class="cat-btn active" data-cat="all"><span class="cat-icon">✦</span>All Items</button>`;
        const cats = SHOP_CONFIG.categories.map(c =>
            `<button class="cat-btn" data-cat="${c.id}"><span class="cat-icon">${c.icon}</span>${c.name}</button>`
        ).join('');
        bar.innerHTML = allBtn + cats;
        bar.querySelectorAll('.cat-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                bar.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                activeCategory = btn.dataset.cat;
                renderProducts();
            });
        });
    }

    // ─── Format price ─────────────────────────────────────────────────
    function fmt(n) {
        return SHOP_CONFIG.currency + n.toFixed(2);
    }

    // ─── Build a single product card ──────────────────────────────────
    function buildCard(p) {
        const accent = p.accent || 'gold';
        const hasDiscount = p.discount && p.discount.percent;
        const hasNew = p.isNew === true;
        const hasTag = p.tag && !hasDiscount && !hasNew;

        // Banner content
        let bannerHTML = '';
        if (p.banner) {
            bannerHTML = `<img src="${p.banner}" alt="${p.name}">`;
        } else if (p.bannerEmoji) {
            bannerHTML = `<div class="banner-emoji">${p.bannerEmoji}</div>`;
        } else {
            bannerHTML = `<div class="banner-emoji">✦</div>`;
        }

        // Badges
        let badgesHTML = '';
        if (hasNew) {
            badgesHTML += `<div class="new-badge">★ New</div>`;
        }
        if (hasDiscount) {
            badgesHTML += `<div class="discount-badge"><span class="pct-num">-${p.discount.percent}%</span><span class="pct-off">OFF</span></div>`;
        }
        if (hasTag) {
            badgesHTML += `<div class="product-tag">${p.tag}</div>`;
        } else if ((hasNew || hasDiscount) && p.tag) {
            // Tag still shown when there are other badges, just placed bottom-left of banner
            badgesHTML += `<div class="product-tag" style="top: auto; bottom: 1rem;">${p.tag}</div>`;
        }

        // Limited stock + timer
        let limitedHTML = '';
        let isSoldOut = false;
        if (p.isLimited) {
            const stock = typeof p.stock === 'number' ? p.stock : 0;
            isSoldOut = stock <= 0;
            const lowStock = stock > 0 && stock <= 5;
            const stockPct = Math.max(0, Math.min(100, (stock / Math.max(stock, 25)) * 100));

            let stockBlock = `
                <div class="stock-row">
                    <span class="stock-label">Stock Left</span>
                    <span class="stock-count ${lowStock ? 'stock-low' : ''}">${isSoldOut ? 'SOLD OUT' : stock + ' units'}</span>
                </div>
                <div class="stock-bar"><div class="stock-bar-fill" style="width: ${stockPct}%"></div></div>
            `;

            let timerBlock = '';
            if (p.limitedUntil) {
                timerBlock = `
                    <div class="timer-row">
                        <span class="timer-label">Ends In</span>
                        <span class="timer-display" data-deadline="${p.limitedUntil}" id="timer-${p.id}">--:--:--</span>
                    </div>
                `;
            }

            limitedHTML = `<div class="limited-info">${stockBlock}${timerBlock}</div>`;
        }

        // Price block
        let priceHTML = '';
        if (hasDiscount && p.discount.originalPrice) {
            priceHTML = `
                <div class="price-block">
                    <span class="price-current">${fmt(p.price)}</span>
                    <span class="price-original">${fmt(p.discount.originalPrice)}</span>
                    ${p.perUnit ? `<span class="price-unit">${p.perUnit}</span>` : ''}
                </div>
            `;
        } else {
            priceHTML = `
                <div class="price-block">
                    <span class="price-current">${fmt(p.price)}</span>
                    ${p.perUnit ? `<span class="price-unit">${p.perUnit}</span>` : ''}
                </div>
            `;
        }

        // CTA
        const ctaHTML = isSoldOut
            ? `<button class="product-cta sold-out" disabled>Sold Out</button>`
            : `<a href="${SHOP_CONFIG.storeUrl}" class="product-cta">Purchase <span class="arrow">→</span></a>`;

        return `
            <div class="product-card" data-accent="${accent}" data-id="${p.id}">
                <div class="product-banner">
                    ${bannerHTML}
                    ${badgesHTML}
                </div>
                <div class="product-body">
                    <h3 class="product-name">${p.name}</h3>
                    ${p.description ? `<p class="product-desc">${p.description}</p>` : ''}
                    ${limitedHTML}
                    ${priceHTML}
                    ${ctaHTML}
                </div>
            </div>
        `;
    }

    // ─── Render products ──────────────────────────────────────────────
    function renderProducts() {
        // Clear all running countdown timers before re-render
        Object.values(timers).forEach(clearInterval);
        for (const k in timers) delete timers[k];

        const grid = document.getElementById('productsGrid');
        const filtered = activeCategory === 'all'
            ? SHOP_CONFIG.products
            : SHOP_CONFIG.products.filter(p => p.category === activeCategory);

        if (filtered.length === 0) {
            grid.innerHTML = `<div class="empty-state">No items in this category yet — check back soon.</div>`;
            return;
        }

        grid.innerHTML = filtered.map(buildCard).join('');

        // Stagger reveal animation
        const cards = grid.querySelectorAll('.product-card');
        cards.forEach((card, i) => {
            setTimeout(() => card.classList.add('visible'), i * 80);
        });

        // Start countdown timers for limited items
        filtered.forEach(p => {
            if (p.isLimited && p.limitedUntil) {
                startCountdown(p.id, p.limitedUntil);
            }
        });
    }

    // ─── Countdown timer ──────────────────────────────────────────────
    function startCountdown(id, deadlineStr) {
        const el = document.getElementById(`timer-${id}`);
        if (!el) return;
        const deadline = new Date(deadlineStr).getTime();

        const tick = () => {
            const now = Date.now();
            const diff = deadline - now;
            if (diff <= 0) {
                el.textContent = 'EXPIRED';
                clearInterval(timers[id]);
                return;
            }
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const mins = Math.floor((diff / (1000 * 60)) % 60);
            const secs = Math.floor((diff / 1000) % 60);
            const pad = n => String(n).padStart(2, '0');

            el.textContent = days > 0
                ? `${days}d ${pad(hours)}h ${pad(mins)}m`
                : `${pad(hours)}:${pad(mins)}:${pad(secs)}`;
        };
        tick();
        timers[id] = setInterval(tick, 1000);
    }

    // ═══════════════════════════════════════════════════════════════════
    //   INIT
    // ═══════════════════════════════════════════════════════════════════
    renderCategories();
    renderProducts();
    </script>

</body>
</html>
