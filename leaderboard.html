<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LightCitySMP | Leaderboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --sun: #FF6B35; --sun-bright: #FF9A5C; --sun-dim: #A03E1A;
            --sun-trace: rgba(255,107,53,0.10); --sun-glow: rgba(255,107,53,0.22);
            --coral: #FF4F6D; --coral-bright: #FF7A8A;
            --aqua: #00D4FF; --aqua-bright: #4DE8FF; --aqua-glow: rgba(0,212,255,0.25);
            --ink: #060E1A; --ink-2: #0A1628; --ink-3: #0F1F35;
            --surface: rgba(255,255,255,0.025); --surface-hover: rgba(255,255,255,0.045);
            --border: rgba(255,107,53,0.14); --border-strong: rgba(255,107,53,0.35);
            --text: #F0EDE8; --text-dim: rgba(240,237,232,0.55); --text-muted: rgba(240,237,232,0.3);
            --diamond: #00D4FF; --diamond-glow: rgba(0,212,255,0.25);
            --gold-rank: #FFD700; --gold-rank-glow: rgba(255,215,0,0.25);
            --iron: #b0b0b0; --iron-glow: rgba(176,176,176,0.25);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Syne', sans-serif; background: var(--ink); color: var(--text); overflow-x: hidden; min-height: 100vh; }

        .bg-layer {
            position: fixed; inset: 0; z-index: -3;
            background:
                radial-gradient(ellipse 80% 60% at 20% 15%, rgba(255,107,53,0.09) 0%, transparent 55%),
                radial-gradient(ellipse 50% 40% at 80% 80%, rgba(0,212,255,0.06) 0%, transparent 50%),
                var(--ink);
        }
        .bg-lines {
            position: fixed; inset: 0; z-index: -2;
            background-image:
                linear-gradient(rgba(255,107,53,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,107,53,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: radial-gradient(ellipse at 50% 40%, black 30%, transparent 75%);
        }
        .bg-particles { position: fixed; inset: 0; z-index: -1; pointer-events: none; overflow: hidden; }
        .particle { position: absolute; border-radius: 50%; opacity: 0; animation: floatUp linear infinite; }
        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 0.5; } 90% { opacity: 0.5; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }

        .loader {
            position: fixed; inset: 0; z-index: 9999; background: var(--ink);
            display: flex; justify-content: center; align-items: center;
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }
        .loader.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .loader-inner { text-align: center; position: relative; width: 200px; height: 200px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .loader-orb { width: 22px; height: 22px; background: var(--sun); border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); box-shadow: 0 0 30px var(--sun), 0 0 60px var(--sun-glow), 0 0 80px rgba(255,79,109,0.2); animation: orbPulse 1.2s ease-in-out infinite; }
        .loader-pulse-ring { position: absolute; top: 50%; left: 50%; width: 60px; height: 60px; border: 1px solid var(--sun); border-radius: 50%; transform: translate(-50%,-50%); opacity: 0; animation: ringExpand 2s ease-out infinite; }
        .loader-label { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; font-weight: 700; letter-spacing: 0.15em; color: var(--sun-bright); text-transform: uppercase; margin-top: 1.5rem; animation: loaderTextPulse 1.5s ease-in-out infinite; position: relative; z-index: 2; text-shadow: 0 0 20px rgba(255,107,53,0.5); }
        .loader-sub { font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; letter-spacing: 0.2em; color: var(--text-muted); text-transform: uppercase; margin-top: 0.4rem; animation: loaderTextPulse 1.5s ease-in-out 0.3s infinite; position: relative; z-index: 2; }
        @keyframes orbPulse { 0%,100% { transform: translate(-50%,-50%) scale(1); } 50% { transform: translate(-50%,-50%) scale(1.3); opacity: 0.7; } }
        @keyframes ringExpand { 0% { transform: translate(-50%,-50%) scale(0.5); opacity: 0.6; } 100% { transform: translate(-50%,-50%) scale(2.5); opacity: 0; } }
        @keyframes loaderTextPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

        nav {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            padding: 1.2rem 5%; display: flex; justify-content: space-between; align-items: center;
            background: rgba(6,14,26,0.88); backdrop-filter: blur(24px);
            border-bottom: 1px solid var(--border);
            transition: padding 0.3s ease, box-shadow 0.3s ease;
        }
        nav.scrolled { padding: 0.9rem 5%; box-shadow: 0 4px 40px rgba(0,0,0,0.7); }
        .logo { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 700; color: var(--sun-bright); text-decoration: none; letter-spacing: 0.03em; text-shadow: 0 0 12px rgba(255,107,53,0.5); }
        .nav-icons { display: flex; gap: 0.6rem; align-items: center; }
        .nav-icon-btn { width: 44px; height: 44px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.3s ease; text-decoration: none; }
        .nav-icon-btn:hover { background: var(--sun-trace); border-color: var(--border-strong); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255,107,53,0.15); }
        .nav-icon-btn.active { background: var(--sun-trace); border-color: var(--sun); box-shadow: 0 0 16px rgba(255,107,53,0.2); }
        .nav-icon-btn svg { width: 20px; height: 20px; fill: var(--sun); transition: transform 0.25s ease; }
        .nav-icon-btn:hover svg { transform: scale(1.1); }

        .page { padding: 120px 5% 80px; max-width: 1300px; margin: 0 auto; }

        .page-header { text-align: center; margin-bottom: 4rem; }
        .page-eyebrow { font-family: 'JetBrains Mono', monospace; font-size: 0.68rem; letter-spacing: 0.3em; color: var(--sun-dim); text-transform: uppercase; margin-bottom: 0.8rem; opacity: 0; animation: fadeUp 0.7s ease 0.1s forwards; }
        .page-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(2.8rem, 7vw, 5.5rem); font-weight: 700; line-height: 0.95; color: var(--sun-bright); text-shadow: 0 0 40px rgba(255,107,53,0.2); opacity: 0; animation: fadeUp 0.7s ease 0.2s forwards; }
        .page-rule { display: flex; align-items: center; gap: 1rem; justify-content: center; margin: 1.2rem 0 0.8rem; opacity: 0; animation: fadeUp 0.7s ease 0.3s forwards; }
        .page-rule span { height: 1px; width: 50px; background: linear-gradient(90deg, transparent, var(--sun-dim)); }
        .page-rule span:last-child { background: linear-gradient(90deg, var(--sun-dim), transparent); }
        .page-rule em { color: var(--sun); font-style: normal; font-size: 0.8rem; }
        .page-sub { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; color: var(--text-muted); letter-spacing: 0.05em; opacity: 0; animation: fadeUp 0.7s ease 0.4s forwards; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* ── PODIUM ── */
        .podium-section { margin-bottom: 4rem; opacity: 0; animation: fadeUp 0.8s ease 0.5s forwards; }
        .podium-wrapper { display: flex; align-items: flex-end; justify-content: center; gap: 1.5rem; padding: 0 1rem 2rem; }
        .podium-card { position: relative; display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1); }
        .podium-card:hover { transform: translateY(-8px) scale(1.02); }
        .podium-base { width: 100%; border-radius: 12px 12px 0 0; display: flex; align-items: center; justify-content: center; padding: 1rem 0; }
        .podium-1 { flex: 0 0 260px; } .podium-2 { flex: 0 0 220px; } .podium-3 { flex: 0 0 200px; }
        .podium-base-1 { height: 90px; background: linear-gradient(180deg, rgba(0,212,255,0.15) 0%, rgba(0,212,255,0.05) 100%); border: 1px solid rgba(0,212,255,0.4); box-shadow: 0 0 40px rgba(0,212,255,0.15), inset 0 1px 0 rgba(0,212,255,0.3); }
        .podium-base-2 { height: 65px; background: linear-gradient(180deg, rgba(255,107,53,0.18) 0%, rgba(255,107,53,0.06) 100%); border: 1px solid rgba(255,107,53,0.45); box-shadow: 0 0 40px rgba(255,107,53,0.2), inset 0 1px 0 rgba(255,107,53,0.3); }
        .podium-base-3 { height: 45px; background: linear-gradient(180deg, rgba(176,176,176,0.12) 0%, rgba(176,176,176,0.04) 100%); border: 1px solid rgba(176,176,176,0.3); box-shadow: 0 0 30px rgba(176,176,176,0.1); }
        .podium-rank-num { font-family: 'Cormorant Garamond', serif; font-size: 2.2rem; font-weight: 700; }
        .podium-rank-num-1 { color: var(--diamond); text-shadow: 0 0 20px rgba(0,212,255,0.8), 0 0 40px rgba(0,212,255,0.4); }
        .podium-rank-num-2 { color: var(--sun-bright); text-shadow: 0 0 20px rgba(255,107,53,0.9), 0 0 40px rgba(255,107,53,0.4); }
        .podium-rank-num-3 { color: var(--iron); text-shadow: 0 0 15px rgba(176,176,176,0.7); }
        .podium-player { display: flex; flex-direction: column; align-items: center; margin-bottom: 0.8rem; gap: 0.6rem; }
        .podium-head-wrap { position: relative; }
        .podium-head { image-rendering: pixelated; border-radius: 10px; background: #1a1a1a; display: block; }
        .podium-head-1 { width: 72px; height: 72px; border: 3px solid var(--diamond); box-shadow: 0 0 20px rgba(0,212,255,0.5), 0 0 40px rgba(0,212,255,0.2); }
        .podium-head-2 { width: 60px; height: 60px; border: 2px solid var(--sun); box-shadow: 0 0 16px rgba(255,107,53,0.5); }
        .podium-head-3 { width: 52px; height: 52px; border: 2px solid var(--iron); box-shadow: 0 0 12px rgba(176,176,176,0.4); }
        .podium-crown { position: absolute; top: -22px; left: 50%; transform: translateX(-50%); font-size: 1.3rem; filter: drop-shadow(0 0 8px rgba(255,107,53,0.8)); animation: crownFloat 3s ease-in-out infinite; }
        @keyframes crownFloat { 0%,100% { transform: translateX(-50%) translateY(0); } 50% { transform: translateX(-50%) translateY(-4px); } }
        .podium-username { font-family: 'Syne', sans-serif; font-weight: 700; text-align: center; }
        .podium-username-1 { font-size: 1.05rem; color: var(--diamond); text-shadow: 0 0 15px rgba(0,212,255,0.6); }
        .podium-username-2 { font-size: 0.95rem; color: var(--sun-bright); text-shadow: 0 0 12px rgba(255,107,53,0.5); }
        .podium-username-3 { font-size: 0.9rem; color: var(--iron); }
        .podium-score { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--text-muted); text-align: center; }
        .podium-score strong { font-size: 1rem; font-weight: 500; }
        .podium-score-1 strong { color: var(--diamond); }
        .podium-score-2 strong { color: var(--sun-bright); }
        .podium-score-3 strong { color: var(--iron); }

        /* ── CONTROLS ── */
        .controls { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; opacity: 0; animation: fadeUp 0.7s ease 0.7s forwards; }
        .search-wrap { flex: 1; min-width: 200px; position: relative; }
        .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--sun-dim); font-size: 0.9rem; pointer-events: none; }
        .search-input { width: 100%; padding: 0.7rem 1rem 0.7rem 2.6rem; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Syne', sans-serif; font-size: 0.9rem; outline: none; transition: all 0.3s ease; }
        .search-input::placeholder { color: var(--text-muted); }
        .search-input:focus { border-color: var(--border-strong); background: var(--surface-hover); box-shadow: 0 0 0 3px rgba(255,107,53,0.08); }
        .sort-tabs { display: flex; gap: 0.4rem; flex-shrink: 0; }
        .sort-tab { padding: 0.6rem 1.2rem; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; transition: all 0.25s ease; white-space: nowrap; }
        .sort-tab:hover { border-color: var(--border-strong); color: var(--sun); background: var(--sun-trace); }
        .sort-tab.active { background: rgba(255,107,53,0.12); border-color: var(--sun); color: var(--sun-bright); box-shadow: 0 0 12px rgba(255,107,53,0.15); }
        .results-count { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: var(--text-muted); letter-spacing: 0.05em; margin-left: auto; flex-shrink: 0; }

        /* ── TABLE ── */
        .table-wrap { background: rgba(255,107,53,0.02); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.4), 0 0 30px rgba(255,107,53,0.04); opacity: 0; animation: fadeUp 0.7s ease 0.8s forwards; }
        .table-header, .table-row { display: grid; grid-template-columns: 60px 1fr 100px 100px 120px; padding: 14px 24px; align-items: center; gap: 8px; }
        .table-header { background: rgba(255,107,53,0.06); border-bottom: 1px solid var(--border); font-family: 'JetBrains Mono', monospace; font-size: 0.68rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--sun-dim); }
        .th-sortable { cursor: pointer; transition: color 0.2s; user-select: none; display: flex; align-items: center; gap: 4px; }
        .th-sortable:hover { color: var(--sun); }
        .th-sortable.active { color: var(--sun-bright); }
        .sort-arrow { font-size: 0.7rem; opacity: 0.6; }
        .table-row { border-bottom: 1px solid rgba(255,107,53,0.04); cursor: pointer; transition: background 0.2s ease, transform 0.15s ease; }
        .table-row:last-child { border-bottom: none; }
        .table-row:hover { background: var(--surface-hover); transform: translateX(3px); }
        .row-rank-1 { background: rgba(0,212,255,0.04); }
        .row-rank-2 { background: rgba(255,107,53,0.04); }
        .row-rank-3 { background: rgba(176,176,176,0.03); }
        .cell-rank { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 700; text-align: center; }
        .rank-1 { color: var(--diamond); animation: rankPulse1 2.5s ease-in-out infinite; }
        .rank-2 { color: var(--sun-bright); animation: rankPulse2 2.5s ease-in-out infinite; }
        .rank-3 { color: var(--iron); text-shadow: 0 0 10px rgba(176,176,176,0.6); }
        .rank-other { color: #555; font-size: 1rem; font-family: 'Syne', sans-serif; font-weight: 600; }
        @keyframes rankPulse1 { 0%,100% { text-shadow: 0 0 12px rgba(0,212,255,0.7), 0 0 24px rgba(0,212,255,0.3); } 50% { text-shadow: 0 0 20px rgba(0,212,255,1), 0 0 40px rgba(0,212,255,0.5); } }
        @keyframes rankPulse2 { 0%,100% { text-shadow: 0 0 12px rgba(255,107,53,0.7), 0 0 24px rgba(255,107,53,0.3); } 50% { text-shadow: 0 0 20px rgba(255,107,53,1), 0 0 40px rgba(255,107,53,0.5); } }
        .cell-player { display: flex; align-items: center; gap: 12px; }
        .cell-head { width: 42px; height: 42px; border-radius: 7px; image-rendering: pixelated; background: #1a1a1a; border: 1px solid rgba(255,107,53,0.2); transition: transform 0.3s ease; flex-shrink: 0; }
        .table-row:hover .cell-head { transform: scale(1.12); }
        .cell-head-1 { border-color: rgba(0,212,255,0.5); box-shadow: 0 0 10px rgba(0,212,255,0.3); }
        .cell-head-2 { border-color: rgba(255,107,53,0.5); box-shadow: 0 0 10px rgba(255,107,53,0.3); }
        .cell-head-3 { border-color: rgba(176,176,176,0.4); box-shadow: 0 0 8px rgba(176,176,176,0.2); }
        .cell-name { font-weight: 600; font-size: 1rem; color: #fff; }
        .cell-name-1 { color: var(--diamond); }
        .cell-name-2 { color: var(--sun-bright); }
        .cell-name-3 { color: var(--iron); }
        .cell-stat { font-family: 'JetBrains Mono', monospace; font-size: 0.92rem; font-weight: 500; text-align: center; }
        .stat-kills { color: #ff6b6b; }
        .stat-skill { color: #4ecdc4; }
        .stat-playtime { color: var(--sun-bright); }
        .cell-stat.highlighted { color: var(--sun-bright); font-weight: 700; }
        .no-results { display: none; text-align: center; padding: 5rem 2rem; }
        .no-results.visible { display: block; }
        .no-results-icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.4; }
        .no-results-text { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; color: var(--text-muted); }

        /* ── MODAL ── */
        .modal-overlay { position: fixed; inset: 0; z-index: 10000; background: rgba(0,0,0,0.75); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; padding: 1rem; opacity: 0; visibility: hidden; transition: opacity 0.35s ease, visibility 0.35s ease; }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-box { background: linear-gradient(145deg, var(--ink-2) 0%, var(--ink-3) 100%); border: 1px solid var(--border-strong); border-radius: 20px; padding: 0; max-width: 540px; width: 100%; max-height: 88vh; overflow-y: auto; position: relative; transform: scale(0.85) translateY(30px); opacity: 0; transition: transform 0.45s cubic-bezier(0.34,1.56,0.64,1), opacity 0.35s ease; box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 60px rgba(255,107,53,0.06); }
        .modal-overlay.active .modal-box { transform: scale(1) translateY(0); opacity: 1; }
        .modal-close-btn { position: absolute; top: 16px; right: 16px; width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #888; font-size: 1.3rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.25s ease; z-index: 5; }
        .modal-close-btn:hover { background: rgba(255,107,53,0.15); border-color: rgba(255,107,53,0.3); color: var(--sun-bright); transform: rotate(90deg); }
        .modal-top { padding: 36px 36px 24px; text-align: center; border-bottom: 1px solid var(--border); }
        .modal-badge { display: inline-block; padding: 4px 16px; border-radius: 20px; font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 14px; animation: badgePulse 2s ease-in-out infinite; }
        .modal-badge-1 { background: rgba(0,212,255,0.1); border: 1px solid rgba(0,212,255,0.4); color: var(--diamond); }
        .modal-badge-2 { background: rgba(255,107,53,0.1); border: 1px solid rgba(255,107,53,0.4); color: var(--sun-bright); }
        .modal-badge-3 { background: rgba(176,176,176,0.1); border: 1px solid rgba(176,176,176,0.35); color: var(--iron); }
        .modal-badge-other { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.12); color: #888; }
        @keyframes badgePulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.04); } }
        .modal-name { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 700; color: #fff; margin-bottom: 4px; }
        .modal-uuid { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: #444; letter-spacing: 0.05em; word-break: break-all; }
        .modal-body { padding: 24px 36px 36px; display: flex; gap: 24px; align-items: flex-start; }
        .modal-skin-col { flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .modal-skin { width: 130px; height: 260px; image-rendering: pixelated; border-radius: 10px; border: 1px solid var(--border); box-shadow: 0 0 30px rgba(255,107,53,0.08); background: var(--ink-3); transition: transform 0.3s ease; }
        .modal-skin:hover { transform: scale(1.03); }
        .modal-skin-label { font-family: 'JetBrains Mono', monospace; font-size: 0.62rem; color: #555; text-transform: uppercase; letter-spacing: 0.15em; }
        .modal-stats-col { flex: 1; display: flex; flex-direction: column; gap: 10px; }
        .modal-stat-row { background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.055); border-radius: 12px; padding: 14px 18px; display: flex; align-items: center; gap: 12px; transition: all 0.25s ease; position: relative; overflow: hidden; }
        .modal-stat-row::before { content: ''; position: absolute; left: 0; top: 0; width: 3px; height: 100%; background: linear-gradient(180deg, var(--sun), var(--sun-dim)); opacity: 0; transition: opacity 0.25s ease; }
        .modal-stat-row:hover { background: rgba(255,255,255,0.04); transform: translateX(4px); }
        .modal-stat-row:hover::before { opacity: 1; }
        .modal-stat-icon { width: 38px; height: 38px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0; }
        .modal-stat-icon.kills { background: rgba(255,107,107,0.12); }
        .modal-stat-icon.skill { background: rgba(78,205,196,0.12); }
        .modal-stat-icon.time { background: rgba(255,154,92,0.12); }
        .modal-stat-info { flex: 1; }
        .modal-stat-label { font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; color: #666; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 2px; }
        .modal-stat-value { font-size: 1.15rem; font-weight: 700; color: #fff; }
        .modal-stat-value.kills { color: #ff6b6b; }
        .modal-stat-value.skill { color: #4ecdc4; }
        .modal-stat-value.time { color: var(--sun-bright); }
        .modal-box::-webkit-scrollbar { width: 5px; }

let currentSort = 'skillPoints';
let currentSearch = '';
let uuidCache = new Map();
let sortedPlayers = [];

async function fetchUUID(username) {
    if (uuidCache.has(username)) return uuidCache.get(username);
    try {
        const r = await fetch(`https://playerdb.co/api/player/minecraft/${username}`);
        if (r.ok) { const d = await r.json(); if (d.success && d.data?.player?.raw_id) { uuidCache.set(username, d.data.player.raw_id); return d.data.player.raw_id; } }
    } catch {}
    try {
        const r2 = await fetch(`https://api.mojang.com/users/profiles/minecraft/${username}`);
        if (r2.ok) { const d2 = await r2.json(); uuidCache.set(username, d2.id); return d2.id; }
    } catch {}
    uuidCache.set(username, null);
    return null;
}

function headUrl(uuid) { return uuid ? `https://crafthead.net/avatar/${uuid}/64` : `https://crafthead.net/avatar/Steve/64`; }
function bodyUrl(uuid) { return uuid ? `https://crafthead.net/body/${uuid}` : `https://crafthead.net/body/Steve`; }

function getSorted(sort) {
    return [...PLAYERS].sort((a, b) => sort === 'playtime' ? b.playtimeRaw - a.playtimeRaw : b[sort] - a[sort]);
}

function getStatLabel(sort, player) {
    if (sort === 'kills') return player.kills.toLocaleString();
    if (sort === 'skillPoints') return player.skillPoints.toLocaleString();
    if (sort === 'playtime') return player.playtime;
    return '';
}

async function renderPodium(sorted) {
    const wrap = document.getElementById('podiumWrapper');
    if (sorted.length < 3) { wrap.innerHTML = ''; return; }
    const top = [sorted[1], sorted[0], sorted[2]];
    const visualRanks = [2, 1, 3];
    const uuids = await Promise.all(top.map(p => fetchUUID(p.username)));
    const sortLabel = { skillPoints: 'SP', kills: 'Kills', playtime: 'Time' }[currentSort];
    wrap.innerHTML = top.map((player, vi) => {
        const rank = visualRanks[vi];
        const uuid = uuids[vi];
        const score = getStatLabel(currentSort, player);
        return `
        <div class="podium-card podium-${rank}" onclick="openModal(${PLAYERS.indexOf(player)}, ${PLAYERS.findIndex(p=>p.username===sorted[rank-1].username)+1})">
            <div class="podium-player">
                ${rank === 1 ? '<div class="podium-crown">🌟</div>' : ''}
                <div class="podium-head-wrap" style="margin-top:${rank===1?'26px':'12px'}">
                    <img class="podium-head podium-head-${rank}" src="${headUrl(uuid)}"
                         onerror="this.src='https://crafthead.net/avatar/Steve/64'" alt="${player.username}">
                </div>
                <div class="podium-username podium-username-${rank}">${player.username}</div>
                <div class="podium-score podium-score-${rank}"><strong>${score}</strong> ${sortLabel}</div>
            </div>
            <div class="podium-base podium-base-${rank}">
                <span class="podium-rank-num podium-rank-num-${rank}">#${rank}</span>
            </div>
        </div>`;
    }).join('');
}

async function renderTable() {
    sortedPlayers = getSorted(currentSort);
    const query = currentSearch.toLowerCase().trim();
    const filtered = query ? sortedPlayers.filter(p => p.username.toLowerCase().includes(query)) : sortedPlayers;
    const body = document.getElementById('tableBody');
    const noResults = document.getElementById('noResults');
    const resultsCount = document.getElementById('resultsCount');
    resultsCount.textContent = query ? `${filtered.length} / ${PLAYERS.length} players` : `${PLAYERS.length} players`;
    if (filtered.length === 0) { body.innerHTML = ''; noResults.classList.add('visible'); return; }
    noResults.classList.remove('visible');
    document.querySelectorAll('.sort-tab').forEach(t => t.classList.toggle('active', t.dataset.sort === currentSort));
    document.querySelectorAll('.th-sortable').forEach(th => {
        const isActive = th.dataset.sort === currentSort;
        th.classList.toggle('active', isActive);
        const arrow = th.querySelector('.sort-arrow');
        if (arrow) arrow.textContent = isActive ? '↓' : '↕';
    });
    const uuidMap = new Map();
    await Promise.all(filtered.map(async p => { const uuid = await fetchUUID(p.username); uuidMap.set(p.username, uuid); }));
    const globalRanks = new Map(sortedPlayers.map((p, i) => [p.username, i + 1]));
    body.innerHTML = filtered.map((player, fi) => {
        const rank = globalRanks.get(player.username);
        const uuid = uuidMap.get(player.username);
        const rowClass = rank <= 3 ? `row-rank-${rank}` : '';
        const rankClass = rank <= 3 ? `rank-${rank}` : 'rank-other';
        const headClass = rank <= 3 ? `cell-head-${rank}` : '';
        const nameClass = rank <= 3 ? `cell-name-${rank}` : '';
        const killsHighlight = currentSort === 'kills' ? ' highlighted' : '';
        const skillHighlight = currentSort === 'skillPoints' ? ' highlighted' : '';
        const timeHighlight = currentSort === 'playtime' ? ' highlighted' : '';
        return `
        <div class="table-row ${rowClass} row-animate" style="animation-delay:${fi * 35}ms"
             onclick="openModal(${PLAYERS.indexOf(player)}, ${rank})">
            <div class="cell-rank ${rankClass}">${rank <= 3 ? '#' + rank : rank}</div>
            <div class="cell-player">
                <img class="cell-head ${headClass}" src="${headUrl(uuid)}"
                     onerror="this.src='https://crafthead.net/avatar/Steve/64'" alt="${player.username}">
                <span class="cell-name ${nameClass}">${player.username}</span>
            </div>
            <div class="cell-stat stat-kills${killsHighlight}">${player.kills.toLocaleString()}</div>
            <div class="cell-stat stat-skill${skillHighlight}">${player.skillPoints.toLocaleString()}</div>
            <div class="cell-stat stat-playtime${timeHighlight} hide-mobile">${player.playtime}</div>
        </div>`;
    }).join('');
    if (!query) { renderPodium(sortedPlayers); document.getElementById('podiumSection').style.display = ''; }
    else { document.getElementById('podiumSection').style.display = 'none'; }
}

async function openModal(playerIndex, rank) {
    const player = PLAYERS[playerIndex];
    const uuid = await fetchUUID(player.username);
    const badge = document.getElementById('modalBadge');
    badge.textContent = `RANK #${rank}`;
    badge.className = `modal-badge modal-badge-${rank <= 3 ? rank : 'other'}`;
    document.getElementById('modalName').textContent = player.username;
    document.getElementById('modalUUID').textContent = uuid || 'UUID not found';
    document.getElementById('modalSkin').src = bodyUrl(uuid);
    document.getElementById('mKills').textContent = player.kills.toLocaleString();
    document.getElementById('mSkill').textContent = player.skillPoints.toLocaleString();
    document.getElementById('mTime').textContent = player.playtime;
    document.getElementById('playerModal').classList.add('active');
    document.body.style.overflow = 'hidden';
}

function closeModal() {
    document.getElementById('playerModal').classList.remove('active');
    document.body.style.overflow = '';
}

document.getElementById('modalCloseBtn').addEventListener('click', closeModal);
document.getElementById('playerModal').addEventListener('click', e => { if (e.target.id === 'playerModal') closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

document.querySelectorAll('.sort-tab, .th-sortable').forEach(el => {
    el.addEventListener('click', () => { currentSort = el.dataset.sort; renderTable(); });
});
document.getElementById('searchInput').addEventListener('input', e => { currentSearch = e.target.value; renderTable(); });

(function() {
    const wrap = document.getElementById('particles');
    const colors = ['#FF6B35','#FF4F6D','#00D4FF','#FF9A5C','#4DE8FF'];
    for (let i = 0; i < 18; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.animationDuration = (12 + Math.random() * 14) + 's';
        p.style.animationDelay = (Math.random() * 14) + 's';
        const s = 1 + Math.random() * 2;
        p.style.width = s + 'px'; p.style.height = s + 'px';
        const color = colors[Math.floor(Math.random() * colors.length)];
        p.style.background = color;
        p.style.boxShadow = `0 0 6px ${color}`;
        wrap.appendChild(p);
    }
})();

window.addEventListener('load', () => { setTimeout(() => document.getElementById('loader').classList.add('hidden'), 1000); });
window.addEventListener('scroll', () => { document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 50); });

document.querySelector('.sort-tab[data-sort="skillPoints"]').classList.add('active');
renderTable();
</script>
